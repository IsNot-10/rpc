//声明了protobuf的版本
syntax = "proto3";


//生成的所有类均在这个namespace下
package fixbug;


//表示生成rpc服务类和rpc方法描述(默认是不生成的)
option cc_generic_services=true;



message ResultCode
{
    int32 errcode=1;
    bytes errmsg=2;
};




//经过protobuf的反射会生成LoginRequest类(继承google::protobuf::Message类)
//内部也提供了name和pwd的各种设置和获取方法
message LoginRequest
{
    string name=1;
    string pwd=2;
};


message LoginResponse
{
    ResultCode result=1;
    bool success=2;
};


message RegisterRequest
{
    uint32 id=1;
    string name=2;
    string pwd=3;
};


message RegisterResponse
{
    ResultCode result=1;
    bool success=2;
};







//在protobuf中定义如何描述一个服务中的rpc方法的类型
//经过protobuf的反射,会生成一个叫UserServiceRpc类,(继承goole::protobuf
//::Service类).同时也生成一个继承UserServiceRpc类的UserServiceRpc_stub类

